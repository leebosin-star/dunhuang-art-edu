<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>美育色 · 敦煌</title>
<link rel="stylesheet" href="css/common.css">
<style>
body {
  background: #1C1410;
  overflow: hidden;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  max-width: 760px;
  padding: 48px 52px;
  text-align: center;
}

/* ---- Block wrapper ---- */
.block {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 1.2s ease-out, transform 1.2s ease-out, color 0.8s ease;
}

.block.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ---- Block 4 special ---- */
.block-closing {
  margin-top: 60px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 1.8s ease-out, transform 1.8s ease-out;
}

.block-closing.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ---- Text styles ---- */
.main-text {
  font-size: 24px;
  font-weight: 500;
  line-height: 1.8;
  letter-spacing: 0.04em;
}

.sub-text {
  font-size: 17px;
  font-weight: 300;
  line-height: 2;
  letter-spacing: 0.03em;
  margin-top: 10px;
  opacity: 0;
  transition: opacity 0.6s ease-out;
}

.sub-text.show {
  opacity: 1;
}

.closing-text {
  font-size: 34px;
  font-weight: 600;
  color: #A07830;
  line-height: 1.7;
}

/* ---- Dimmed state ---- */
.block.dimmed {
  color: #4A3F35;
}

/* ---- Click hint ---- */
.hint {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  letter-spacing: 0.18em;
  color: rgba(249,245,235,0.3);
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 60;
}

.hint.hidden { opacity: 0; }
</style>
</head>
<body>

<!-- 公共粒子画布 & 光标 -->
<canvas id="globalCanvas" class="global-canvas"></canvas>
<div id="cursorDot" class="cursor-dot"></div>
<div id="cursorRing" class="cursor-ring"></div>

<div class="container">

  <div id="b1" class="block">
    <p class="main-text" id="m1">美育色解决的是第一件事——让孩子愿意靠近敦煌。</p>
    <p class="sub-text" id="s1">不是通过课本，是通过手里的颜色。</p>
  </div>

  <div id="b2" class="block">
    <p class="main-text" id="m2">但颜色一旦可溯源，它就不只是颜色了。</p>
    <p class="sub-text" id="s2">这个颜色来自哪个洞窟、属于哪个朝代、由什么矿物制成——孩子开始追问，认知就发生了。</p>
  </div>

  <div id="b3" class="block">
    <p class="main-text" id="m3">追问不会停在这里。</p>
    <p class="sub-text" id="s3">顺着颜色往回走，走到壁画，走到矿石，走到这套色彩最初被创造出来的地方——探真，是颜色自己带他去的，不是我们推他去的。</p>
  </div>

  <div id="b4" class="block-closing">
    <p class="closing-text">我们做的事，是把这条线的起点，交到孩子手里。</p>
  </div>

</div>

<div class="hint" id="hint">点击继续</div>

<script src="js/common.js"></script>
<script>
(function() {
  var step = 0;
  var maxStep = 4;
  var b1 = document.getElementById('b1');
  var b2 = document.getElementById('b2');
  var b3 = document.getElementById('b3');
  var b4 = document.getElementById('b4');
  var hint = document.getElementById('hint');

  function showBlock(b, mainId, subId, cb) {
    b.classList.add('visible');
    var sub = document.getElementById(subId);
    setTimeout(function() {
      sub.classList.add('show');
      if (cb) setTimeout(cb, 600);
    }, 300);
  }

  function dimBlock(b) {
    b.classList.add('dimmed');
  }

  function advance() {
    if (step >= maxStep) return;

    if (step === 0) {
      showBlock(b1, 'm1', 's1');
    } else if (step === 1) {
      dimBlock(b1);
      showBlock(b2, 'm2', 's2');
    } else if (step === 2) {
      dimBlock(b2);
      showBlock(b3, 'm3', 's3');
    } else if (step === 3) {
      dimBlock(b1);
      dimBlock(b2);
      dimBlock(b3);
      b4.classList.add('visible');
    }

    step++;
    if (step >= maxStep) hint.classList.add('hidden');
  }

  document.body.addEventListener('click', advance);
})();
</script>

</body>
</html>
