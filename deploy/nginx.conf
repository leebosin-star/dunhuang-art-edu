server {
    listen 80;
    server_name _;

    root /var/www/dunhuang;
    index index.html;

    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Large static assets — long cache
    location ~* \.(glb|wasm|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # DHP website
    location /dhp/ {
        try_files $uri $uri/ $uri.html /dhp/index.html;
    }

    # SPA fallback
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
